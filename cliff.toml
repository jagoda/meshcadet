# git-cliff configuration — drives release-plz's CHANGELOG.md regeneration
# (release-plz.toml's `changelog_config`). See
# docs/adr/0004-release-architecture.md for how this fits the release
# architecture.
#
# Output is Keep a Changelog (https://keepachangelog.com/en/1.1.0/) shaped,
# matching CHANGELOG.md's existing hand-written format. release-plz keeps
# everything above the first `## [...]` heading untouched (this file's
# `header` is intentionally empty), and only ever (re)writes the version
# section(s) below it.

[changelog]
header = ""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first | trim }}\
    {% endfor %}
{% endfor %}\n\
"""
trim = true
footer = ""

[git]
# Regenerate strictly from Conventional Commits (enforced going forward by
# .github/workflows/commitlint.yml) — anything that doesn't parse as one is
# dropped rather than surfaced as a raw, un-triaged commit subject.
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true

# Maps a Conventional Commit `type` to a Keep a Changelog section. Anything
# not listed here (chore, ci, build, test, style, and any `chore(release)`
# commit release-plz itself makes) is internal bookkeeping and is skipped —
# it stays out of the user-facing CHANGELOG.md entirely.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert", group = "Reverted" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
