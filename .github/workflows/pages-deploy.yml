name: Deploy Pages

# Publishes site/ (the GitHub Pages project-site landing page, see
# site/README.md) via GitHub Actions' native Pages deployment — no gh-pages
# branch, no Jekyll. Deliberately push-to-main-only: pages-check.yml owns the
# PR-facing relative-path regression guard, so this workflow never appears on
# a site PR's checks list — only on the push that actually publishes.
# `workflow_dispatch` is kept as a trigger (parity with the pre-split
# workflow) but build/deploy still guard on `github.event_name == 'push'`, so
# a manual dispatch reaches the runner without actually publishing — it's not
# a bypass around the push-to-main-only publish path.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

# Only one Pages deployment at a time; never cancel one mid-flight in favor
# of a newer push, to avoid ever publishing a torn/partial site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
