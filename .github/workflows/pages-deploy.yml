name: Deploy Pages

# Publishes site/ (the GitHub Pages project-site landing page, see
# site/README.md) via GitHub Actions' native Pages deployment — no gh-pages
# branch, no Jekyll. Deliberately push-to-main-only + release-published-only:
# pages-check.yml owns the PR-facing relative-path regression guard, so this
# workflow never appears on a site PR's checks list — only on the push/
# release that actually publishes.
#
# The `release: published` trigger exists so a newly tagged firmware release
# (.github/workflows/release.yml) shows up on flash.html's version selector
# promptly: the build job's "Mirror recent release firmware assets" step
# below downloads each recent release's manifest.json + merged image into
# site/firmware/<tag>/ (git-ignored, not committed — see site/README.md)
# before site/ is uploaded as the Pages artifact, because GitHub Release
# assets are NOT fetchable cross-origin from Pages (verified live: no
# Access-Control-Allow-Origin on the release-asset redirect chain — see
# docs/adr/0006-web-flasher.md). Every ordinary site/**-triggered deploy also
# re-runs this mirror step, so it self-heals if a release-triggered deploy
# ever fails partway.
#
# BUT `release: published` never actually fires in practice for THIS repo's
# releases (confirmed live: zero `event == "release"` runs of this workflow
# exist despite v0.1.0/v0.2.0/v0.3.0 all having published — see
# meshcadet-flasher-metadata-and-flash-status mission). Cause: GitHub Actions
# does not dispatch new workflow runs for events produced by the built-in
# `GITHUB_TOKEN` (the standard anti-recursion guard — see
# https://docs.github.com/en/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow),
# and release.yml's "Publish GitHub Release" step authenticates `gh release
# create` with exactly that token. The `release: published` trigger above is
# kept (it still fires for a release published by a human through the GitHub
# UI/a PAT, which isn't GITHUB_TOKEN-authored) but cannot be relied on alone.
#
# The `workflow_run` trigger below is the actual fix: it fires on the
# completion of the (separate) "release" workflow run itself, which is a
# real event regardless of what token that run used internally — so it is
# NOT subject to the same suppression. This is the documented workaround for
# exactly this GITHUB_TOKEN limitation. Until this lands, a release with no
# immediately-following site/**-touching push (e.g. v0.3.0, published with
# no site push until this fix's own PR) sits unmirrored — 404 on
# firmware/<tag>/{manifest.json,update-meta.json} — and flash.js's fetches
# read that as "not available" rather than "not yet deployed".
#
# `workflow_dispatch` is kept as a trigger (parity with the pre-split
# workflow) but build/deploy still guard on `github.event_name` being `push`,
# `release`, or a successful `workflow_run`, so a manual dispatch reaches the
# runner without actually publishing — it's not a bypass around the
# publish-on-push-or-release(-or-release-workflow-completion) path.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages-deploy.yml"
  release:
    types: [published]
  workflow_run:
    workflows: ["release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

# Only one Pages deployment at a time; never cancel one mid-flight in favor
# of a newer push, to avoid ever publishing a torn/partial site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Mirror recent release firmware assets
        # Populates site/firmware/<tag>/{manifest.json,meshcadet-<tag>-merged.bin,SHA256SUMS}
        # for flash.html/flash.js — see the workflow header comment above.
        # Also mirrors the app-only Upgrade artifacts (manifest-update.json,
        # meshcadet-<tag>-app.bin, update-meta.json) added by
        # docs/adr/0008-nondestructive-update-artifacts.md and consumed by
        # docs/adr/0009-two-path-flasher.md's Upgrade path — see the
        # best-effort second `gh release download` call below.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Keep this equal to site/flash.js's MAX_VERSIONS — the dropdown
          # only shows what's mirrored here. No shared build step to enforce
          # that automatically (site/README.md "no build step, on purpose"),
          # so it's a manually-kept-in-sync constant in both places.
          max_versions=8

          # per_page=100 (single page, no --paginate) comfortably covers
          # max_versions=8 plus any drafts/prereleases filtered out below —
          # revisit if this project ever accumulates 100+ releases.
          #
          # --method GET is required here: gh api defaults to POST as soon as
          # any -f/-F field is attached (see `gh api --help`), which routes
          # this call at the release-creation endpoint instead of the
          # releases-list endpoint and 422s on a missing tag_name. Without
          # --method GET, switching -F to -f alone does NOT fix this.
          tags=$(gh api --method GET "repos/${{ github.repository }}/releases" -f per_page=100 \
            --jq '[.[] | select(.draft == false and .prerelease == false and (.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$")))]
                  | sort_by(.published_at) | reverse | .[:'"$max_versions"'] | .[].tag_name')

          if [ -z "$tags" ]; then
            echo "No published v*.*.* releases yet — nothing to mirror."
            exit 0
          fi

          # Each tag is mirrored independently and failures here are NOT
          # fatal to the step (deliberately outside `set -e`'s reach, via the
          # `if !` guards below): one flaky/incomplete release (see
          # release.yml's own "KNOWN FAILURE MODE" doc comment — a Release
          # can legitimately be missing an asset if its publish step got
          # interrupted) must not take down the entire Pages deploy, which
          # would otherwise re-break every OTHER already-working mirrored
          # version too. A tag that fails to mirror cleanly is skipped (with
          # a build-log warning) rather than left as a partial, broken
          # site/firmware/<tag>/ that the dropdown could still list.
          echo "$tags" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Mirroring release assets for ${tag}"
            dest="site/firmware/${tag}"
            mkdir -p "$dest"
            if ! gh release download "$tag" \
              --repo "${{ github.repository }}" \
              --dir "$dest" \
              --pattern 'manifest.json' \
              --pattern 'meshcadet-*-merged.bin' \
              --pattern 'SHA256SUMS' \
              --clobber; then
              echo "::warning::gh release download failed for ${tag} — skipping (not mirrored onto Pages this deploy)"
              rm -rf "$dest"
              continue
            fi
            if [ ! -f "${dest}/manifest.json" ] || ! ls "${dest}"/meshcadet-*-merged.bin >/dev/null 2>&1; then
              echo "::warning::${tag} is missing manifest.json or its merged image after download — skipping (not mirrored onto Pages this deploy)"
              rm -rf "$dest"
              continue
            fi

            # Best-effort: the app-only Upgrade artifacts (ADR-0008) don't
            # exist on releases published before that ADR landed (v0.1.0,
            # v0.2.0) — that's expected, not a failure, so a non-match here
            # is NOT treated as a mirror failure (no `::warning::`, no
            # `rm -rf "$dest"`) and doesn't affect the required-assets check
            # above. site/flash.js's own update-meta.json fetch already
            # treats "not mirrored" the same as "mirrored but
            # upgrade_safe:false" (Fresh install only) — see
            # docs/adr/0009-two-path-flasher.md D2/D6.
            gh release download "$tag" \
              --repo "${{ github.repository }}" \
              --dir "$dest" \
              --pattern 'manifest-update.json' \
              --pattern 'meshcadet-*-app.bin' \
              --pattern 'update-meta.json' \
              --clobber || true
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
