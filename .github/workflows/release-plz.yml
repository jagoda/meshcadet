name: release-plz

# Opens/updates a "release vX.Y.Z" PR (version bump + CHANGELOG.md) from
# Conventional Commits landed on `main`, and — once such a PR is merged —
# creates the `vX.Y.Z` git tag that fires the (separate, later) production
# firmware release workflow. See docs/adr/0004-release-architecture.md for
# the full release architecture and release-plz.toml/cliff.toml for the
# versioning/changelog config this workflow runs.
#
# No crates.io publish happens from this workflow: every crate in the root
# workspace is `publish = false` (Cargo.toml) and release-plz.toml sets
# `[workspace].publish = false` explicitly too.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Runs release-plz's "release" step: if `main` already carries a version
  # bump that isn't tagged yet (i.e. a release-plz PR was just merged), tag
  # it `vX.Y.Z`. No-op on every other push (nothing new to tag).
  release-plz-release:
    name: release-plz release (tag)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pinned toolchain
        run: rustup show

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs release-plz's "release-pr" step: opens/updates the "release vX.Y.Z"
  # PR from Conventional Commits landed since the last tag. No-op if there's
  # nothing new to release.
  release-plz-pr:
    name: release-plz release-pr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pinned toolchain
        run: rustup show

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
