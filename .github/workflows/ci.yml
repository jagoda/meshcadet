name: CI

# Runs the full host-native test suite + static checks, PLUS a firmware
# cross-compile build gate, on every PR and on every push to main. Toolchain
# version for the host jobs is NOT pinned in this file — it is pinned exactly
# once, at the repo root in `rust-toolchain.toml` (channel "stable" + the
# rustfmt/clippy components), and `rustup show` below just forces that pin to
# resolve/install before the cache and build steps run.
#
# ── Scope: host-testable crates + fmt + clippy, plus a separate firmware job ─
#
# `protocol`, `host`, `xtask`, `ui_sim`, and `ui_perf` are the root Cargo
# workspace's members (see workspace/Cargo.toml's own doc comment) — they
# build and test on stable Rust with no extra tooling, which is exactly what
# the `test`/`fmt`/`clippy` jobs below exercise.
#
# `firmware/` is deliberately a DETACHED workspace (its own `[workspace]`
# table in firmware/Cargo.toml) that cross-compiles for
# `xtensa-esp32s3-espidf` under the Espressif `esp` rustc fork, and its
# build.rs additionally shells out to a native C/FreeType toolchain to
# generate the bundled emoji font and pulls down a full ESP-IDF sysroot via
# `embuild`/`esp-idf-sys`. That toolchain weight is exactly why firmware gets
# its OWN job (`firmware`, below) instead of being folded into `test`/
# `clippy`: a transient Espressif-side install hiccup should never block the
# fast host lane, and the host lane should never wait on the slower firmware
# toolchain bootstrap. The `firmware` job:
#   - installs the Espressif Rust fork via `esp-rs/xtensa-toolchain` (pinned
#     action version) + `ldproxy` (the linker firmware/.cargo/config.toml
#     requires) + the same native build.rs prerequisites as the host jobs
#     (FreeType/DejaVu for the bundled emoji-font gen step, which firmware's
#     build.rs also runs);
#   - caches the ESP-IDF sysroot (`~/.espressif`, `firmware/.embuild`) and the
#     firmware `target/` dir, since ESP-IDF v5.2.2 — pinned once, in
#     firmware/.cargo/config.toml's `ESP_IDF_VERSION`, not here — rebuilds
#     from source on every cold run without it;
#   - runs the project's existing, documented firmware build gate verbatim:
#     `cd firmware && bash check-all-features.sh` (see CONTRIBUTING.md
#     "Building and testing"). That script builds every feature combination
#     (default + diagnostics; the hil combos auto-skip when the
#     hardware-only, gitignored `src/hil_keys.rs` is absent, which it always
#     is on a CI runner) — CI and the manual gate a human runs before landing
#     firmware changes are now the same command, not a re-implementation of
#     it.

#
# ── Path filter: skip entirely on site-only changes ──────────────────────
#
# All five jobs below build/test/lint the Rust workspace or the firmware
# cross-compile — none of them touch `site/` or `pages.yml`, so a PR whose
# diff is scoped to the GitHub Pages landing site gets nothing useful from
# running them. `paths-ignore` skips the WHOLE workflow (all five jobs) when
# every changed file matches the ignore list; any change outside it (any
# Rust/firmware file, or ci.yml itself) still triggers the full suite
# unchanged. `pages.yml`'s own `check` job already covers site-only PRs.
#
# This is a plain skip, not a "companion job reports success" shim, because
# it doesn't need to be: ruleset `main` (id 18807600, see
# `gh api repos/jagoda/meshcadet/rulesets/18807600`) has no
# `required_status_checks` rule — only `pull_request`, `required_signatures`,
# `non_fast_forward`, `deletion`. None of these five jobs are GitHub-required
# checks today, so skipping them leaves nothing in "Expected — waiting for
# status" and a site-only PR stays mergeable. If a `required_status_checks`
# rule is ever added to 18807600 naming one of these jobs, this filter would
# reintroduce that deadlock on site-only PRs — switch to a companion
# always-green job (or per-job `if:` guards that still report a conclusion)
# at that point instead of a bare `paths-ignore`.
on:
  pull_request:
    paths-ignore:
      - "site/**"
      - ".github/workflows/pages.yml"
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - ".github/workflows/pages.yml"
  # Lets a maintainer (or CI verification tooling) kick a run on-demand from
  # any branch without needing an open PR — `gh workflow run ci.yml --ref
  # <branch>`. Purely additive to the required pull_request/push triggers.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  version-drift-guard:
    name: firmware/Cargo.toml version matches workspace version
    runs-on: ubuntu-latest
    # `firmware/` is a DETACHED workspace (see Cargo.toml's own doc comment
    # and firmware/Cargo.toml's `[workspace]` table) — release-plz manages
    # the ONE version at the root `[workspace.package].version` and cannot
    # cross the workspace boundary to bump firmware/Cargo.toml's hardcoded
    # `version` field too (docs/adr/0004-release-architecture.md). This job
    # is the guard that keeps the two in lockstep: it fails loudly on any PR
    # that bumps one without the other, instead of the drift going unnoticed
    # until release time.
    steps:
      - uses: actions/checkout@v4

      - name: Compare root workspace version to firmware/Cargo.toml version
        run: |
          set -euo pipefail
          root_version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          firmware_version=$(grep -m1 '^version = ' firmware/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "root [workspace.package].version = ${root_version}"
          echo "firmware/Cargo.toml [package].version = ${firmware_version}"
          if [ "${root_version}" != "${firmware_version}" ]; then
            echo "::error::Version drift: root workspace is ${root_version} but firmware/Cargo.toml is ${firmware_version}. firmware/ is a detached workspace (see Cargo.toml doc) — release-plz cannot bump it directly, so it must be bumped by hand in the same PR as any root version change." >&2
            exit 1
          fi

  test:
    name: cargo test (protocol, host, xtask, ui_sim, ui_perf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Native prerequisites for the host-native workspace's build.rs steps
      # (ui_sim / ui_perf embed real Slint markup + assets at compile time via
      # the same i-slint-compiler machinery firmware uses) — see README.md
      # "Building from a fresh clone" for the authoritative package list.
      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libfreetype6-dev fonts-dejavu-core

      # Resolves rust-toolchain.toml (channel + rustfmt/clippy components) —
      # the toolchain pin lives there, not in this workflow.
      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo test --workspace
        run: cargo test --workspace --locked

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain
        run: rustup show

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libfreetype6-dev fonts-dejavu-core

      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  firmware:
    name: firmware build gate (check-all-features.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same native build.rs prerequisites as the host jobs (see comment
      # above `test`) — firmware/build.rs runs the identical FreeType/DejaVu
      # emoji-font gen step.
      - name: Install native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libfreetype6-dev fonts-dejavu-core

      # Installs the Espressif `esp` Rust fork (Xtensa target support) via
      # espup, restricted to esp32s3 since that's the only MCU this project
      # targets (see firmware/.cargo/config.toml). `GITHUB_TOKEN` avoids
      # espup's unauthenticated-GitHub-API rate limit (see the action's own
      # README).
      - name: Install Rust for Xtensa (esp toolchain)
        uses: esp-rs/xtensa-toolchain@v1.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          default: true
          buildtargets: esp32s3

      # firmware/.cargo/config.toml's [target.xtensa-esp32s3-espidf] linker
      # is `ldproxy` — same install command README.md documents for local
      # dev setup.
      - name: Install ldproxy
        run: cargo install ldproxy --locked

      # ESP-IDF v5.2.2 is pinned once, in firmware/.cargo/config.toml's
      # ESP_IDF_VERSION (not re-pinned here) — esp-idf-sys bootstraps that
      # sysroot into ~/.espressif and firmware/.embuild on first build.
      # Without caching it, every run rebuilds the sysroot from source.
      - name: Cache ESP-IDF sysroot
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            firmware/.embuild
          key: esp-idf-${{ runner.os }}-${{ hashFiles('firmware/.cargo/config.toml', 'firmware/Cargo.lock') }}
          restore-keys: |
            esp-idf-${{ runner.os }}-

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "firmware -> target"

      # The canonical firmware build gate — same command CONTRIBUTING.md
      # documents for a human to run manually before landing firmware
      # changes. Builds default (production) + diagnostics; the hil combos
      # auto-skip since src/hil_keys.rs is gitignored/absent on a CI runner.
      - name: cd firmware && bash check-all-features.sh
        run: cd firmware && bash check-all-features.sh
