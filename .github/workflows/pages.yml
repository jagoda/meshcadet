name: Deploy Pages

# Publishes site/ (the GitHub Pages project-site landing page, see
# site/README.md) via GitHub Actions' native Pages deployment — no gh-pages
# branch, no Jekyll. `check` runs on PRs too, as a regression guard for the
# site's one hard rule (relative paths only — see check-relative-paths.sh);
# `build`/`deploy` only run on push to main, which is where they have the
# `pages: write` permission to actually publish.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

# Only one Pages deployment at a time; never cancel one mid-flight in favor
# of a newer push, to avoid ever publishing a torn/partial site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject root-absolute asset/href paths
        # This is a PROJECT Pages site (served at /meshcadet/, not a root
        # site), so any href/src starting with "/" 404s in production even
        # though it works from a local file:// or `python3 -m http.server`
        # preview. Guard the mission's core acceptance criterion so a future
        # page/section can't silently regress it.
        run: |
          if grep -rnE '(href|src)="/' site --include='*.html'; then
            echo "::error::found a root-absolute href/src in site/ — this is a project Pages site (/meshcadet/…), paths must be relative (e.g. \"assets/foo.png\", not \"/assets/foo.png\")"
            exit 1
          fi

  build:
    needs: check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
