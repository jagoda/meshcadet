name: Pages Check

# PR-facing regression guard for the site's one hard rule (relative paths
# only — see check-relative-paths below and site/README.md "Conventions"),
# PLUS the provisioning-codec conformance guard (see the `codec-conformance`
# job below). Deliberately pull_request-only and deliberately does NOT build
# or deploy anything: pages-deploy.yml owns build/upload-pages-artifact/
# deploy-pages and only fires on push to main, so a site PR's checks list
# shows this validation and nothing about deploy (no more "build"/"deploy"
# showing as skipped on every PR).
on:
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/pages-check.yml"
      # `codec-conformance` (below) guards site/provisioner/codec.js against
      # drift from protocol::provisioning / the FRAME_RSP_HISTORY_ENTRY codec
      # in protocol::history — the wire-format source of truth. Without these
      # paths, a PR that changes ONLY the Rust side (no site/** touch) would
      # never trigger this workflow, and byte-exact drift could land silently.
      # See docs/adr/0007-provisioner-codec.md.
      - "protocol/src/provisioning.rs"
      - "protocol/src/history.rs"
      - "xtask/src/golden.rs"
      - "xtask/src/bin/gen_prov_golden_vectors.rs"
      - "xtask/Cargo.toml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject root-absolute asset/href paths
        # This is a PROJECT Pages site (served at /meshcadet/, not a root
        # site), so any href/src starting with "/" 404s in production even
        # though it works from a local file:// or `python3 -m http.server`
        # preview. Guard the mission's core acceptance criterion so a future
        # page/section can't silently regress it.
        run: |
          if grep -rnE '(href|src)="/' site --include='*.html'; then
            echo "::error::found a root-absolute href/src in site/ — this is a project Pages site (/meshcadet/…), paths must be relative (e.g. \"assets/foo.png\", not \"/assets/foo.png\")"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: session.js orchestration smoke test (mocked Web Serial)
        # site/provisioner/session.js (the async Web Serial transport +
        # QUERY_STATUS handshake driving provisioner.html) has no Rust
        # counterpart to golden-vector against (unlike codec.js — see the
        # codec-conformance job below) — host/src/session.rs is synchronous
        # and is never itself modified by this code (see
        # docs/adr/0007-provisioner-codec.md, Finding 2). This is its own
        # regression coverage instead: retry/resync orchestration exercised
        # against a fake `navigator.serial` port built from Node's built-in
        # WHATWG Streams globals. See the test file's own header for details.
        run: node site/provisioner/session.smoke.test.mjs

      - name: contact-uri.js matches host/src/main.rs's url_encode + URI construction
        # Checked against the SAME fixtures as host/src/main.rs's own
        # #[cfg(test)] module — see the test file's own header.
        run: node site/provisioner/contact-uri.test.mjs

      - name: validation.js's hex/byte-length checks match host/src/main.rs's CLI parsers
        # site/provisioner/validation.js is the M2 write-form counterpart to
        # host/src/main.rs's `parse_32bytes_hex`/`parse_channel_secret_hex`/
        # the `Cmd::Identity` set-name length check plus the sensitive-data
        # `validatePin` (mirrors MAX_PIN_LEN) — see the test file's own header.
        run: node site/provisioner/validation.test.mjs

      - name: history-format.js matches host/src/history_format.rs's transcript columns
        # site/provisioner/history-format.js is the DOM-free port of
        # host/src/history_format.rs (the export-history transcript renderer);
        # this asserts the same header/data column-alignment invariant the
        # Rust module's own tests do. See the test file's own header.
        run: node site/provisioner/history-format.test.mjs

  codec-conformance:
    name: site/provisioner/codec.js matches protocol::provisioning byte-for-byte
    runs-on: ubuntu-latest
    # `site/provisioner/codec.js` is a hand-ported, pure-JS reimplementation
    # of protocol::provisioning (+ the FRAME_RSP_HISTORY_ENTRY payload codec
    # in protocol::history) — see docs/adr/0007-provisioner-codec.md for why
    # it's pure JS instead of a WASM build of `protocol` (keeps the site's
    # "no build step, on purpose" convention, site/README.md). A hand port
    # has no compiler to catch wire-format drift, so this job is the guard:
    # it generates golden vectors straight from the real Rust codec, then
    # asserts the JS codec reproduces every one byte-for-byte / field-for-
    # field. Fails loud (nonzero exit) on any mismatch — see
    # site/provisioner/codec.conformance.test.mjs's own header for how to
    # reproduce this locally.
    steps:
      - uses: actions/checkout@v4

      # Resolves rust-toolchain.toml (channel + rustfmt/clippy components) —
      # the toolchain pin lives there, not in this workflow. Same pattern as
      # ci.yml's host-native jobs.
      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate golden vectors from the real Rust codec
        run: cargo run -q -p xtask --bin gen-prov-golden-vectors --locked > /tmp/prov-golden-vectors.json

      - name: Assert codec.js reproduces every golden vector byte-for-byte
        run: node site/provisioner/codec.conformance.test.mjs /tmp/prov-golden-vectors.json
