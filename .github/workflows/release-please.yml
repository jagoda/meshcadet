name: release-please

# Opens/updates a "chore(release): vX.Y.Z" PR (version bump + CHANGELOG.md)
# from Conventional Commits landed on `main`, and — in the SAME run that
# detects such a PR was just merged — creates the `vX.Y.Z` git tag (which
# fires the separate, later production firmware release workflow) and a
# matching GitHub Release object. See docs/adr/0004-release-architecture.md
# for the full release architecture and release-please-config.json/
# .release-please-manifest.json for the versioning/changelog config this
# workflow runs.
#
# No crates.io publish happens from this workflow, and it never invokes
# `cargo` at all — not even in the Cargo.lock-sync steps below: release-please
# is pure git/GitHub-API/text-manifest automation (no `cargo package`/`cargo
# publish` step exists to gate on `publish = false`, unlike the
# release-plz-based setup this replaced).
#
# release-please-config.json does NOT set `skip-github-release` (see §2's
# revision history in docs/adr/0004-release-architecture.md for why): a
# release-please-managed GitHub Release, changelog-only and asset-free, is
# what release-please itself uses to flip a merged release PR's
# `autorelease: pending` label to `autorelease: tagged` — that label flip is
# unreachable when `skip-github-release: true`, which is exactly why every
# release used to deadlock with "untagged, merged release PRs outstanding"
# on the very next run. The production firmware release workflow
# (.github/workflows/release.yml) still owns the *user-facing* shape of that
# same Release object — it finds the Release release-please already created
# for the tag and edits/uploads onto it (flashable image, manifest, SLSA
# provenance) rather than creating a second, competing Release.
#
# `draft: true` + `force-tag-creation: true` (also release-please-config.json):
# the Release release-please creates here stays a draft — invisible to the
# public — until release.yml un-drafts it once the real assets are attached,
# so `.github/workflows/pages-deploy.yml`'s `release: published` trigger (it
# mirrors this release's firmware assets onto the site flasher) fires
# exactly once, with everything already in place, instead of firing early
# against an asset-free placeholder. `force-tag-creation` is required
# alongside `draft` because GitHub otherwise defers creating the underlying
# git tag until a draft release is published — without it, this workflow's
# own `push: tags` trigger would never fire.
#
# Unlike the release-plz-based setup this replaced (two separate jobs, one
# for "open/update the PR", one for "tag on merge"), release-please-action
# does both in a single step: it detects on every run whether the current
# state of `main` is an unreleased accumulation of commits (open/update the
# PR) or a just-merged release PR (create the tag + Release), so one job
# covers both.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  # Needed only for the "Dispatch the production release build" step below
  # (`actions.createWorkflowDispatch` against release.yml) — see that step's
  # comment and docs/adr/0004-release-architecture.md §12.
  actions: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please (PR + tag)
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please's tag creation above (`release_created == 'true'`)
      # runs entirely as GITHUB_TOKEN, and GitHub deliberately suppresses
      # downstream workflow triggers — including release.yml's own
      # `push: tags` — for refs/commits/releases created by GITHUB_TOKEN
      # (recursion prevention; see "Triggering a workflow from a workflow"
      # in the GitHub Actions docs). Confirmed live: v0.3.2's tag (run
      # 29370203650) never fired release.yml, stranding the release as an
      # empty draft with none of its six assets. workflow_dispatch and
      # repository_dispatch are the documented exceptions to that
      # suppression — they fire a run regardless of which token requested
      # it — so this step explicitly dispatches release.yml instead of
      # relying on the (silently-suppressed) tag push.
      #
      # `ref: tag_name` is what makes release.yml's own `github.ref_name`
      # resolve to the tag (not `main`) — actions/checkout in that workflow
      # then checks out the tag commit exactly as a real `push: tags` event
      # would, with no change needed to any of its tag-derivation logic.
      # `inputs.tag` is passed too and cross-checked there against
      # `github.ref_name`: belt-and-suspenders in case this ever gets
      # dispatched by hand with the ref selector left on the wrong branch —
      # see release.yml's "Verify tag matches workspace version" step.
      #
      # No new secret/token is introduced: `actions: write` on the ambient
      # GITHUB_TOKEN (permissions: above) is sufficient to call this API,
      # unlike the rejected alternative of a fine-grained PAT/GitHub App
      # token (docs/adr/0004-release-architecture.md §12).
      - name: Dispatch the production release build for the new tag
        if: steps.release.outputs.release_created == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Same defensive shape as release.yml's own "Publish or update
            // GitHub Release" retry loop (gh release view, 5x/5s): a short
            // retry against read-after-write lag on GitHub's side between
            // the tag `createRelease()` just made (previous step) and this
            // dispatch call needing that ref to already resolve. Not
            // expected to ever exhaust in practice (the tag-creation call
            // above already awaited its own response), but cheap insurance
            // for the one step this whole mission exists to make reliable.
            const ref = "${{ steps.release.outputs.tag_name }}";
            const maxAttempts = 3;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: "release.yml",
                  ref,
                  inputs: { tag: ref },
                });
                core.info(`Dispatched release.yml for ${ref} (attempt ${attempt}/${maxAttempts}).`);
                break;
              } catch (error) {
                if (attempt === maxAttempts) {
                  core.setFailed(`Failed to dispatch release.yml for ${ref} after ${maxAttempts} attempts: ${error.message}`);
                  throw error;
                }
                core.warning(`Dispatch attempt ${attempt}/${maxAttempts} for ${ref} failed: ${error.message} — retrying in 5s.`);
                await new Promise((resolve) => setTimeout(resolve, 5000));
              }
            }

      # release-please has no built-in Cargo.lock awareness for
      # `release-type: simple` (see docs/adr/0004-release-architecture.md
      # §2/§10) — its `extra-files` config bumps Cargo.toml/
      # firmware/Cargo.toml's version STRINGS but never touches Cargo.lock
      # or firmware/Cargo.lock, so both lockfiles keep pinning the OLD
      # version. `ci.yml`'s `cargo test --locked`/`cargo clippy --locked`
      # then hard-fail on the release PR: "cannot update the lock file
      # because --locked was passed". The steps below keep both lockfiles
      # in sync on the release PR branch whenever release-please opens or
      # updates it (`prs_created` — false on the separate run that only
      # tags a just-merged release PR, so this is a no-op there).
      #
      # This still doesn't invoke `cargo` (the property described above):
      # scripts/sync-cargo-lock-versions.sh is a text-only substitution —
      # see its header for why not `cargo update`/`cargo generate-lockfile`
      # (would need the `esp`/Xtensa toolchain this runner doesn't have for
      # firmware/Cargo.lock, and can silently drag in unrelated dependency
      # upgrades for the root lockfile).
      - name: Check out the release PR branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}

      - name: Sync Cargo.lock/firmware/Cargo.lock to the version bump
        if: steps.release.outputs.prs_created == 'true'
        run: scripts/sync-cargo-lock-versions.sh

      - name: Check whether the lockfile sync changed anything
        id: lockdiff
        if: steps.release.outputs.prs_created == 'true'
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.lock firmware/Cargo.lock; then
            echo "Cargo.lock/firmware/Cargo.lock already in sync; nothing to commit."
            echo "changed=false" >>"${GITHUB_OUTPUT}"
          else
            echo "changed=true" >>"${GITHUB_OUTPUT}"
          fi

      # Commits the lockfile sync via the GraphQL `createCommitOnBranch`
      # mutation instead of a plain in-runner `git commit` + `git push`.
      # This is NOT a cosmetic choice: this repo's `main` ruleset
      # (`required_signatures`, docs/adr/0004-release-architecture.md §5)
      # requires every commit reaching `main` to carry a verified signature,
      # and GitHub checks the signature status of EVERY commit on a PR
      # before it will let even a squash-merge through — a PR with one
      # unverified commit is unmergeable regardless of merge strategy, it
      # is not enough for the final synthesized squash commit to be signed.
      # A plain `git commit` made by the runner's local, unconfigured git
      # identity has no GPG/SSH signature at all ("unverified, reason:
      # unknown_key" — confirmed live against this repo: commit `4ef0737`
      # on the since-closed PR #25 is exactly this failure mode). Commits
      # made through GitHub's own API (REST Contents API or, as here,
      # GraphQL `createCommitOnBranch`) are instead authored AND signed by
      # GitHub itself server-side and always show as Verified — the same
      # mechanism release-please-action's own bump commit already uses
      # (PR #25's `3a7125d` bump commit is `verified: true` from the same
      # run that produced the unverified `4ef0737`), which is why this step
      # mirrors it rather than inventing a separate signing setup.
      # headBranch is derived from the already-checked-out working tree
      # (`git rev-parse --abbrev-ref HEAD`) rather than re-reading it off
      # `steps.release.outputs.pr`/`.prs`: those release-please-action
      # outputs are unset (empty string) on every run where `prs_created`
      # is false — including the routine "just tagged a merged release PR,
      # no open PR this run" case documented above the checkout step — and
      # `fromJson('')` throws "The template is not valid ... Error reading
      # JToken from JsonReader". Critically, a step's `env:` block is
      # evaluated by the runner BEFORE its `if:` gate is checked (`with:`
      # inputs, like the checkout step's `ref:` above, are not — they're
      # only resolved once `if:` passes), so that fromJson(...) blew up on
      # *every* tag-only run regardless of this step's own `if:` guard
      # (confirmed live: run 29216419373, ##[error] at line 116, on a
      # `prs_created == false` run). The preceding "Check out the release
      # PR branch" step already resolved and checked out that exact branch
      # by name (actions/checkout@v4 running `git checkout -B <branch>
      # origin/<branch>` for a plain branch ref — an attached HEAD, not
      # detached), so `git rev-parse --abbrev-ref HEAD` here reproduces the
      # same value without ever touching the unset-output/fromJson path.
      - name: Commit the lockfile sync via a GitHub-signed API commit
        if: steps.release.outputs.prs_created == 'true' && steps.lockdiff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { execSync } = require("child_process");

            const headBranch = execSync("git rev-parse --abbrev-ref HEAD").toString().trim();
            const headOid = execSync("git rev-parse HEAD").toString().trim();
            const changedFiles = execSync(
              "git diff --name-only -- Cargo.lock firmware/Cargo.lock"
            )
              .toString()
              .trim()
              .split("\n")
              .filter(Boolean);

            const additions = changedFiles.map((path) => ({
              path,
              contents: fs.readFileSync(path).toString("base64"),
            }));

            const result = await github.graphql(
              `mutation($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid }
                }
              }`,
              {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${context.repo.owner}/${context.repo.repo}`,
                    branchName: headBranch,
                  },
                  message: {
                    headline: "chore(release): sync Cargo.lock to the version bump above",
                  },
                  expectedHeadOid: headOid,
                  fileChanges: { additions },
                },
              }
            );

            core.info(
              `created signed commit ${result.createCommitOnBranch.commit.oid} on ${headBranch}`
            );
