name: release

# Tag-fired production firmware release. Fires on `vX.Y.Z` tags (created by
# release-please once a "chore(release): vX.Y.Z" PR merges — see
# .github/workflows/release-please.yml + docs/adr/0004-release-architecture.md
# §7/§8) — in practice via the `workflow_dispatch` trigger below, which
# release-please.yml calls explicitly, since GitHub suppresses the `push:
# tags` trigger for GITHUB_TOKEN-authored tags (recursion prevention; see
# §12 and the `workflow_dispatch:` block's own comment). `push: tags`
# remains for a tag pushed by hand outside release-please. Either way, this
# workflow then:
#   1. verifies the tag's version matches the checked-out Cargo.toml version
#      (the same drift-guard spirit as ci.yml's version-drift-guard job, just
#      against the tag instead of firmware/Cargo.toml);
#   2. builds PRODUCTION firmware (default features — NO diagnostics, NO
#      hil) inside the pinned release container (firmware/release-container/),
#      injecting the release version via the phase-2 seam
#      (MESHCADET_RELEASE_VERSION, firmware/build.rs::emit_build_version);
#   3. merges bootloader + custom partition-table (mc_hist) + app into one
#      flashable image via `esptool merge_bin`
#      (firmware/release-container/build.sh has the exact offsets/rationale;
#      see also firmware/scripts/flash-with-partition-table.sh, which flashes
#      the same three components separately for local dev) — this is the
#      Fresh-install artifact, unchanged;
#   4. ALSO keeps the standalone app image (build.sh no longer discards it)
#      as a second, app-only UPDATE artifact, plus release-time compatibility
#      metadata (`layout_hash`/`upgrade_safe`, computed by build.sh against
#      the committed `firmware/layout-baseline.txt`) — see
#      docs/adr/0008-nondestructive-update-artifacts.md, the CONTRACT the
#      site flasher child consumes;
#   5. publishes onto the GitHub Release for this tag: the merged image, the
#      app-only image, an esp-web-tools `manifest.json` (Fresh install) and
#      `manifest-update.json` (app-only Upgrade, single part @ 0x10000),
#      `update-meta.json` (layout_hash/upgrade_safe), and `SHA256SUMS`;
#   6. attests SLSA build provenance over those six published assets.
#
# release-please (.github/workflows/release-please.yml) already created the
# Release object for this tag — changelog notes only, no assets — in the
# same run that created the tag; that Release is how release-please's own
# `autorelease: pending` -> `autorelease: tagged` label flip happens (see
# release-please.yml's header comment and docs/adr/0004-release-architecture.md
# §2/§7 for why that flip is otherwise unreachable). This workflow does not
# create a second, competing Release for the same tag — it finds the one
# release-please made and edits/uploads onto it (title + real release notes,
# then the six assets below).
#
# See docs/release-reproducibility.md for the full rebuild + third-party
# verification recipe (this workflow and that doc must describe the exact
# same steps — that doc IS the promise this workflow keeps).
#
# Deliberately reuses ci.yml's `firmware` job's toolchain-install *shape*
# (esp-rs/xtensa-toolchain equivalent, ldproxy, ESP-IDF v5.2.2 cache) but NOT
# its actual runner-side install: this workflow's toolchain lives inside the
# pinned container instead, since reproducibility requires the exact
# freetype/DejaVu versions build.rs's emoji-font generator sees to be pinned
# (see firmware/release-container/Dockerfile) — a bare `esp-rs/xtensa-toolchain`
# runner step, like ci.yml uses, installs whatever the OS image currently
# ships, which drifts over time.

on:
  push:
    tags:
      - "v*.*.*"
  # release-please.yml chains into this trigger (`actions.createWorkflowDispatch`,
  # `ref: <the tag it just created>`) because GITHUB_TOKEN-authored tag
  # pushes never fire the `push: tags` trigger above (GitHub's recursion
  # suppression) — workflow_dispatch is a documented exception to that
  # suppression. See release-please.yml's "Dispatch the production release
  # build" step and docs/adr/0004-release-architecture.md §12. The `tag`
  # input is cross-checked against `github.ref_name` in "Verify tag matches
  # workspace version" below — dispatching with `ref:` set to the tag is
  # what makes `github.ref_name` equal the tag at all; the input is a
  # defensive check against a manual dispatch that forgot to move the ref
  # selector off `main`.
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Tag being released (e.g. v0.3.3). Must match the ref this run is
          dispatched against — release-please.yml always sets both to the
          same tag; a manual "Run workflow" dispatch must select that tag
          from the branch/tag ref selector too, not just fill in this field.
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  # Never cancel a release build mid-flight — cancellation after the GitHub
  # Release object is created but before all assets upload would publish a
  # Release page missing its firmware image.
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build production firmware (merged image)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      # Fails fast (before the expensive container build below) if the tag
      # doesn't match what's actually checked out — the release-please.yml /
      # version-drift-guard contract (docs/adr/0004-release-architecture.md
      # §1) should make this impossible in practice, but a manually pushed
      # tag bypasses both, so check it here too.
      - name: Verify tag matches workspace version
        id: version
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # workflow_dispatch cross-check: this run must have been
          # dispatched with `ref:` set to the same tag named in the `tag`
          # input (release-please.yml always does this — see that
          # workflow's "Dispatch the production release build" step). If
          # they disagree, the ref selector was left on the wrong
          # branch/tag (e.g. a manual dispatch that forgot to move it off
          # `main`) — fail loudly instead of silently building the wrong
          # ref as if it were a release.
          if [ -n "${DISPATCH_TAG}" ] && [ "${DISPATCH_TAG}" != "${tag}" ]; then
            echo "::error::workflow_dispatch input tag=${DISPATCH_TAG} does not match the ref this run was dispatched against (github.ref_name=${tag}). Re-run with the ref selector set to ${DISPATCH_TAG}." >&2
            exit 1
          fi
          version="${tag#v}"
          root_version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          firmware_version=$(grep -m1 '^version = ' firmware/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "tag ${tag} -> version ${version}"
          echo "root [workspace.package].version = ${root_version}"
          echo "firmware/Cargo.toml version = ${firmware_version}"
          if [ "${version}" != "${root_version}" ] || [ "${version}" != "${firmware_version}" ]; then
            echo "::error::Tag ${tag} does not match the checked-out workspace version (root=${root_version}, firmware=${firmware_version}). This should be impossible for a release-please-created tag (docs/adr/0004-release-architecture.md §1's drift guard) — was this tag pushed manually?" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # SOURCE_DATE_EPOCH per the reproducibility recipe (docs/release-
      # reproducibility.md): the tag commit's own date, not "now" — a
      # rebuild of the SAME tag on a later date must embed the same value.
      - name: Derive SOURCE_DATE_EPOCH from the tag commit
        id: sde
        run: echo "epoch=$(git log -1 --format=%ct HEAD)" >> "$GITHUB_OUTPUT"

      # Cache key includes the Dockerfile + build.sh (image contents) so a
      # change to either invalidates the cache; ESP-IDF's own sysroot is
      # bootstrapped INSIDE the container on first use and lives inside the
      # container filesystem for that run, so caching it across runs would
      # require pushing the built image to a registry — out of scope for
      # this workflow (each release build is infrequent enough that a cold
      # ESP-IDF bootstrap per release is an acceptable cost; ci.yml's
      # per-PR/per-push firmware job is the one that needs that cache).
      - name: Build the pinned release container
        run: |
          docker build \
            -f firmware/release-container/Dockerfile \
            -t meshcadet-release-builder:${{ github.sha }} \
            firmware

      - name: Build production firmware + merged image
        run: |
          mkdir -p dist
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            meshcadet-release-builder:${{ github.sha }} \
            "${{ steps.version.outputs.tag }}" "${{ steps.sde.outputs.epoch }}"

      - name: Upload merged image artifact
        uses: actions/upload-artifact@v4
        with:
          name: merged-image
          path: dist/meshcadet-${{ steps.version.outputs.tag }}-merged.bin
          if-no-files-found: error

      # The app-only update artifact + its compatibility-gate metadata
      # (docs/adr/0008-nondestructive-update-artifacts.md) — build.sh writes
      # both directly, since layout_hash needs the raw bootloader.bin/
      # partition-table.bin bytes only available inside the build container.
      - name: Upload update-artifact + metadata
        uses: actions/upload-artifact@v4
        with:
          name: update-artifacts
          path: |
            dist/meshcadet-${{ steps.version.outputs.tag }}-app.bin
            dist/update-meta.json
          if-no-files-found: error

  release:
    name: publish GitHub Release + attest provenance
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: merged-image
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: update-artifacts
          path: dist

      - name: Generate esp-web-tools manifest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cat > dist/manifest.json <<EOF
          {
            "name": "MeshCadet",
            "version": "${TAG}",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "meshcadet-${TAG}-merged.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF

      # The app-only Upgrade counterpart to manifest.json above — a single
      # part at 0x10000 (65536, the `factory` app partition offset —
      # firmware/partitions.csv), never at 0 (which would be a Fresh-install/
      # erasing manifest). `new_install_prompt_erase: false` per
      # docs/adr/0008-nondestructive-update-artifacts.md D4: the manifest
      # shape must not itself force a full-chip erase — esp-web-tools' own
      # erase semantics for a genuinely non-erasing write are resolved live
      # by the site child; this manifest is what makes that resolution
      # possible in the first place. `update-meta.json` (mirrored alongside)
      # carries `upgrade_safe` — the site child must gate offering this
      # manifest on that flag, since a layout-incompatible device flashed
      # app-only would be corrupted regardless of what this manifest itself
      # says.
      - name: Generate esp-web-tools manifest-update.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cat > dist/manifest-update.json <<EOF
          {
            "name": "MeshCadet (Upgrade)",
            "version": "${TAG}",
            "new_install_prompt_erase": false,
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "meshcadet-${TAG}-app.bin", "offset": 65536 }
                ]
              }
            ]
          }
          EOF

      - name: Generate SHA256SUMS
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum \
            "meshcadet-${TAG}-merged.bin" \
            "meshcadet-${TAG}-app.bin" \
            manifest.json \
            manifest-update.json \
            update-meta.json \
            > SHA256SUMS
          cd -

      # Provenance for exactly the six published assets, over their final
      # bytes (post-manifest/checksum generation, pre-upload) — see
      # docs/release-reproducibility.md for the `gh attestation verify`
      # third-party re-check this pairs with.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/meshcadet-${{ github.ref_name }}-merged.bin
            dist/meshcadet-${{ github.ref_name }}-app.bin
            dist/manifest.json
            dist/manifest-update.json
            dist/update-meta.json
            dist/SHA256SUMS

      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          awk -v heading="## [${VERSION}]" '
            index($0, heading) == 1 { found=1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for [${VERSION}] — see CHANGELOG.md." > release-notes.md
          fi

      # Idempotent by design (both the release-object step and the asset
      # upload): re-running this job (workflow_dispatch or re-running a
      # failed run) safely repeats "point the Release at the real
      # title/notes, then re-upload all six assets" rather than needing the
      # manual `gh release upload <missing-file>` / `gh release delete` +
      # re-run recovery a plain, non-idempotent `gh release create` would
      # require after a network blip mid-upload.
      - name: Publish or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # release-please already created the Release object for this tag —
          # as a DRAFT, changelog notes only, no assets — in the same run
          # that created the tag itself (release-please-config.json's
          # `draft: true` + `force-tag-creation: true`; the latter is
          # required so the git tag is created immediately instead of only
          # upon publishing the draft, which is what actually fires this
          # workflow — see this workflow's header comment and
          # docs/adr/0004-release-architecture.md §2/§7/§11). Keeping it a
          # draft until everything below is attached matters: a non-draft
          # Release fires GitHub's `release: published` event immediately,
          # which `.github/workflows/pages-deploy.yml` listens for to mirror
          # this release's firmware assets onto the site flasher — firing
          # that before any asset exists would mirror nothing, and a later
          # `gh release edit` does NOT refire `published` (only `edited`),
          # so the site would never pick up this tag's real assets at all.
          # `gh release edit` here replaces the draft's placeholder
          # title/notes with the real ones; `gh release create` is the
          # fallback for a tag pushed by hand (bypassing release-please
          # entirely), which has no Release yet and is created published
          # immediately, same as this step always did before this change.
          #
          # This step runs after the multi-minute firmware build job above,
          # long after release-please's own job (tag + Release, a handful of
          # API calls) has finished — so the Release is normally already
          # visible on the very first check. The short retry loop below is a
          # defensive margin against GitHub API read-after-write lag, not a
          # load-bearing wait for release-please to finish.
          release_exists=false
          for _ in 1 2 3 4 5; do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              release_exists=true
              break
            fi
            sleep 5
          done

          if [ "${release_exists}" = "true" ]; then
            echo "Release ${TAG} already exists (release-please's draft) — updating its title/notes."
            gh release edit "${TAG}" \
              --title "MeshCadet ${TAG}" \
              --notes-file release-notes.md
          else
            echo "No existing Release for ${TAG} (manually pushed tag?) — creating it directly."
            gh release create "${TAG}" \
              --title "MeshCadet ${TAG}" \
              --notes-file release-notes.md
          fi

          # --clobber: overwrite any asset a prior partial run already
          # uploaded, rather than failing with "asset already exists".
          gh release upload "${TAG}" --clobber \
            "dist/meshcadet-${TAG}-merged.bin" \
            "dist/meshcadet-${TAG}-app.bin" \
            "dist/manifest.json" \
            "dist/manifest-update.json" \
            "dist/update-meta.json" \
            "dist/SHA256SUMS"

          # Un-draft last, now that the real notes and every asset are in
          # place, so `release: published` fires exactly once with a
          # complete Release — never on the `gh release create` fallback
          # branch above, which already published on creation.
          if [ "${release_exists}" = "true" ]; then
            gh release edit "${TAG}" --draft=false
          fi

      # Explicitly (rather than implicitly, via GitHub cascading a further
      # event off of this run's own completion) tells pages-deploy.yml to
      # mirror this release's assets onto the site flasher. This run's own
      # completion already raises a `workflow_run` event that
      # pages-deploy.yml listens for — but when THIS run was itself reached
      # via release-please.yml's GITHUB_TOKEN-authored `workflow_dispatch`
      # call (the normal path now — see release-please.yml's "Dispatch the
      # production release build" step), that `workflow_run` completion
      # event is itself GITHUB_TOKEN-cascaded and gets silently suppressed
      # one hop further down the chain, exactly like the original `push:
      # tags` was (confirmed live: v0.4.0 sat unmirrored — see mission
      # meshcadet-pages-mirror-missed-dispatched-release).
      # `repository_dispatch`, like `workflow_dispatch`, is a documented
      # exception to that suppression regardless of how many hops deep it
      # is raised, so firing it directly here — rather than depending on
      # this job's own completion to cascade something further — closes
      # that gap regardless of whether this run itself was reached via
      # `push` or `workflow_dispatch`. This is deliberately NOT a
      # `workflow_dispatch` call against pages-deploy.yml directly: that
      # workflow's own `workflow_dispatch` trigger is intentionally kept
      # non-publishing (see its header comment) so a manual "Run workflow"
      # click there can never masquerade as a real release/push publish —
      # a distinct trigger type is what lets pages-deploy.yml tell the two
      # apart.
      - name: Notify Pages to mirror this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/dispatches" \
            -f event_type=release-published
